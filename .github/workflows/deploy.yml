name: Deploy VitePress Site

on:
  # mainブランチへのプッシュ時に実行
  push:
    branches: [main]
  # プルリクエスト時にビルドチェックを実行
  pull_request:
    branches: [main]
  # 手動実行も可能に
  workflow_dispatch:

jobs:
  # ビルドとデプロイ準備を行うジョブ
  build:
    runs-on: ubuntu-latest
    # GitHub Pagesへのアクセス権を設定
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # GitHub Pagesの設定
      - name: Setup Pages
        uses: actions/configure-pages@v3

      # ビルド成果物をアップロード
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: apps/main-site/.vitepress/dist
