name: Deploy VitePress Site

on:
  # mainブランチへのプッシュ時に実行
  push:
    branches: [main]
  # プルリクエスト時にビルドチェックを実行
  pull_request:
    branches: [main]
  # 手動実行も可能に
  workflow_dispatch:

jobs:
  # ビルドのみを行うシンプルなジョブ
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # ビルド成功を確認するだけのステップ
      - name: Verify build success
        run: |
          echo "Build completed successfully!"
          ls -la apps/main-site/.vitepress/dist
